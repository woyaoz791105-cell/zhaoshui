<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img" aria-label="abstract project trace">
  <defs>
    <linearGradient id="b" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f6f4ed"/>
      <stop offset="0.45" stop-color="#cbd7ee"/>
      <stop offset="1" stop-color="#001f88"/>
    </linearGradient>
    <filter id="blur"><feGaussianBlur stdDeviation="34"/></filter>
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.72" numOctaves="3" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 0.16"/>
      </feComponentTransfer>
    </filter>
  </defs>
  <rect width="1200" height="675" fill="url(#b)"/>
  <g filter="url(#blur)">
    <circle cx="310" cy="270" r="190" fill="#f8f6ee" opacity="0.8"/>
    <circle cx="710" cy="290" r="220" fill="#0030a8" opacity="0.72"/>
    <circle cx="1000" cy="460" r="260" fill="#001b79" opacity="0.65"/>
  </g>
  <rect x="145" y="120" width="910" height="435" rx="42" fill="#ffffff" opacity="0.09" stroke="#ffffff" stroke-opacity="0.55"/>
  <rect width="1200" height="675" filter="url(#grain)"/>
</svg>
